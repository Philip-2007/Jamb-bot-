<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMB 2026 CBT Practice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { color: #fff; text-align: center; margin-bottom: 10px; }
        .gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #a0a0b0; text-align: center; margin-bottom: 30px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #fff; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: #fff;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-secondary { background: rgba(255,255,255,0.1); }
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .subject-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            color: #fff;
        }
        .subject-card.selected { border-color: #667eea; background: rgba(102,126,234,0.1); }
        .subject-card .emoji { font-size: 30px; margin-bottom: 10px; }
        .question-box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
        }
        .question-text { color: #fff; font-size: 20px; margin-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 20px;
            color: #fff;
            cursor: pointer;
        }
        .option.selected { border-color: #667eea; background: rgba(102,126,234,0.2); }
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            width: 0%;
        }
        .timer { color: #667eea; font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 20px; }
        .counter { color: #fff; text-align: center; margin-bottom: 15px; }
        .result-box { text-align: center; color: #fff; }
        .result-score { font-size: 60px; font-weight: 700; color: #667eea; margin: 20px 0; }
        .total-marks {
            font-size: 24px;
            padding: 15px;
            background: rgba(102,126,234,0.2);
            border-radius: 15px;
            margin: 15px 0;
        }
        .total-marks span {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            display: block;
        }
        .nav-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .telegram-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .telegram-link a {
            background: #0088cc;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
        }
        .admin-link { text-align: center; margin-top: 20px; }
        .admin-link a { color: #667eea; text-decoration: none; }
        .loading { color: #a0a0b0; text-align: center; padding: 20px; }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .subject-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Register Screen -->
        <div id="registerScreen" class="screen active">
            <h1>­¤ō▒ <span class="gradient">Register</span></h1>
            <p class="subtitle">Enter your details to start</p>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" placeholder="e.g., Philip John">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="phoneNumber" placeholder="08123456789">
            </div>
            <div class="form-group">
                <label>Email (Optional)</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <button class="btn" onclick="register()">Continue ŌåÆ</button>
            <div class="telegram-link">
                <a href="https://t.me/jamb2026quiz_bot" target="_blank">­¤ō▒ Open in Telegram</a>
            </div>
        </div>

        <!-- Mode Screen -->
        <div id="modeScreen" class="screen">
            <h1>­¤Ä» <span class="gradient">Select Mode</span></h1>
            <p class="subtitle">Choose your test format</p>
            <button class="btn" onclick="selectMode('exam')">­¤ōØ EXAM MODE</button>
            <button class="btn" onclick="selectMode('cbt')">­¤Æ╗ CBT MODE (160 Qs, 400 Marks)</button>
        </div>

        <!-- Exam Settings -->
        <div id="examSettingsScreen" class="screen">
            <h1>ŌÜÖ’ĖÅ <span class="gradient">Exam Settings</span></h1>
            <div class="form-group">
                <label>Subject *</label>
                <select id="examSubject">
                    <option value="">-- Choose --</option>
                    <option value="English">­¤ō¢ English</option>
                    <option value="Mathematics">­¤¦« Mathematics</option>
                    <option value="Physics">ŌÜĪ Physics</option>
                    <option value="Chemistry">­¤¦¬ Chemistry</option>
                    <option value="Biology">­¤¦¼ Biology</option>
                </select>
            </div>
            <div class="form-group">
                <label>Questions (10-100)</label>
                <input type="number" id="examQuestions" min="10" max="100" value="60">
            </div>
            <div class="form-group">
                <label>Time in minutes (10-180)</label>
                <input type="number" id="examTime" min="10" max="180" value="30">
            </div>
            <button class="btn" onclick="startExam()">Start Exam ŌåÆ</button>
            <button class="btn btn-secondary" onclick="showScreen('modeScreen')">­¤öÖ Back</button>
        </div>

        <!-- CBT Subject Selection -->
        <div id="subjectScreen" class="screen">
            <h1>­¤ōÜ <span class="gradient">Select Subjects</span></h1>
            <p class="subtitle">English (Compulsory) + 3 more</p>
            <div id="subjectContainer" class="subject-grid"></div>
            <button class="btn" id="continueBtn" onclick="continueFromSubjects()" disabled>Continue ŌåÆ</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="timer" id="timer">ŌÅ▒’ĖÅ 30:00</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="counter" id="questionCounter">Question 1 of 60</div>
            <div class="question-box">
                <div id="subjectLabel" style="color: #667eea; margin-bottom: 10px;"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">ŌŚĆ’ĖÅ PREV</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()">NEXT Ō¢Č’ĖÅ</button>
            </div>
            <button class="btn btn-secondary" onclick="submitQuiz()">­¤ōØ SUBMIT QUIZ</button>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="screen">
            <h1>­¤Åü <span class="gradient">Quiz Completed!</span></h1>
            <div class="result-box">
                <div id="resultEmoji" style="font-size: 50px;"></div>
                <div class="result-score" id="resultScore"></div>
                <div class="total-marks">
                    TOTAL MARKS
                    <span id="totalMarksValue">0/400</span>
                </div>
                <div id="resultFeedback" style="color: #a0a0b0; margin-bottom: 20px;"></div>
                <div id="subjectBreakdown" style="text-align: left;"></div>
                <button class="btn" onclick="location.reload()">­¤öä Start New Quiz</button>
            </div>
        </div>

        <!-- Admin Link -->
        <div class="admin-link">
            <a href="#" onclick="showAdmin()">­¤öÉ Admin</a>
        </div>
    </div>

    <script>
        // JSONBin Credentials
        const JSONBIN_BIN_ID = '69e0db67aaba882197069654';
        const JSONBIN_API_KEY = '$2a$10$Ailo1FCdiaG3coaubaZK3O80dS9MOHCx6zOtBWxpBbiDcNbA8y5w6';
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
        const ADMIN_PASSWORD = 'admin2026';
        
        let currentUser = null;
        let currentMode = null;
        let selectedSubjects = [];
        let questions = [];
        let currentIndex = 0;
        let answers = [];
        let startTime = null;
        let timerInterval = null;
        let timeLimit = 0;
        let quizResults = null;
        let allCloudResults = [];

        const questionBank = { English: [], Mathematics: [], Physics: [], Chemistry: [], Biology: [] };
        const emojis = { English: '­¤ō¢', Mathematics: '­¤¦«', Physics: 'ŌÜĪ', Chemistry: '­¤¦¬', Biology: '­¤¦¼' };

        async function loadQuestions() {
            const files = { English: 'english.json', Mathematics: 'math.json', Physics: 'physics.json', Chemistry: 'chemistry.json', Biology: 'biology.json' };
            for (let s in files) {
                try {
                    const res = await fetch(files[s]);
                    const data = await res.json();
                    if (Array.isArray(data)) questionBank[s] = data;
                    else if (typeof data === 'object') {
                        for (let k in data) {
                            if (Array.isArray(data[k])) questionBank[s] = questionBank[s].concat(data[k]);
                            else if (data[k].question) questionBank[s].push(data[k]);
                        }
                    }
                } catch(e) { console.error('Failed to load', s); }
            }
        }

        function register() {
            const name = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();
            if (!name || !phone) { alert('Name and phone required'); return; }
            currentUser = { name, phone, email: document.getElementById('email').value.trim() || 'N/A' };
            showScreen('modeScreen');
        }

        function selectMode(mode) {
            currentMode = mode;
            if (mode === 'exam') showScreen('examSettingsScreen');
            else { timeLimit = 80 * 60; showScreen('subjectScreen'); renderSubjects(); }
        }

        function renderSubjects() {
            const container = document.getElementById('subjectContainer');
            const subs = ['Mathematics', 'Physics', 'Chemistry', 'Biology'];
            selectedSubjects = ['English'];
            container.innerHTML = '';
            subs.forEach(s => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.innerHTML = `<div class="emoji">${emojis[s]}</div><h3>${s}</h3>`;
                card.onclick = () => {
                    if (selectedSubjects.includes(s)) selectedSubjects = selectedSubjects.filter(x => x !== s);
                    else if (selectedSubjects.length < 4) selectedSubjects.push(s);
                    else { alert('Max 3 additional subjects'); return; }
                    card.classList.toggle('selected');
                    document.getElementById('continueBtn').disabled = selectedSubjects.length !== 4;
                };
                container.appendChild(card);
            });
        }

        function startExam() {
            const subj = document.getElementById('examSubject').value;
            const num = parseInt(document.getElementById('examQuestions').value);
            const mins = parseInt(document.getElementById('examTime').value);
            if (!subj || num < 10 || num > 100 || mins < 10 || mins > 180) { alert('Invalid settings'); return; }
            selectedSubjects = [subj];
            timeLimit = mins * 60;
            generateQuestions(num);
            startQuiz();
        }

        function continueFromSubjects() {
            if (selectedSubjects.length !== 4) { alert('Select 3 additional subjects'); return; }
            generateQuestions(40);
            startQuiz();
        }

        function generateQuestions(numPerSubject) {
            questions = [];
            selectedSubjects.forEach(s => {
                const bank = questionBank[s] || [];
                const shuffled = [...bank].sort(() => Math.random() - 0.5);
                shuffled.slice(0, Math.min(numPerSubject, bank.length)).forEach(q => {
                    questions.push({ ...q, subject: s });
                });
            });
            questions = questions.sort(() => Math.random() - 0.5);
            answers = new Array(questions.length).fill(null);
        }

        function startQuiz() {
            currentIndex = 0;
            startTime = Date.now();
            showScreen('quizScreen');
            renderQuestion();
            startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const remaining = Math.max(0, timeLimit - elapsed);
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                document.getElementById('timer').textContent = `ŌÅ▒’ĖÅ ${mins}:${secs.toString().padStart(2, '0')}`;
                if (remaining <= 0) submitQuiz();
            }, 1000);
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            document.getElementById('progressFill').style.width = ((currentIndex + 1) / questions.length * 100) + '%';
            document.getElementById('subjectLabel').textContent = `­¤ō¢ ${q.subject}`;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            
            const opts = Array.isArray(q.options) ? q.options : Object.values(q.options || {});
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option' + (answers[currentIndex] === i ? ' selected' : '');
                div.textContent = `${String.fromCharCode(65 + i)}. ${opt}`;
                div.onclick = () => { answers[currentIndex] = i; renderQuestion(); };
                container.appendChild(div);
            });
            
            document.getElementById('prevBtn').style.display = currentIndex > 0 ? 'block' : 'none';
            document.getElementById('nextBtn').textContent = currentIndex === questions.length - 1 ? 'FINISH Ō¢Č’ĖÅ' : 'NEXT Ō¢Č’ĖÅ';
        }

        function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }
        function nextQuestion() { if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); } else { submitQuiz(); } }

        async function submitQuiz() {
            clearInterval(timerInterval);
            const unanswered = answers.filter(a => a === null).length;
            if (unanswered > 0 && !confirm(`${unanswered} unanswered. Submit anyway?`)) { startTimer(); return; }
            
            let correct = 0;
            const subjectScores = {};
            questions.forEach((q, i) => {
                const ans = answers[i];
                let correctIdx = q.correct ?? (q.answer ? (typeof q.answer === 'string' ? q.answer.toUpperCase().charCodeAt(0) - 65 : q.answer) : 0);
                if (!subjectScores[q.subject]) subjectScores[q.subject] = { correct: 0, total: 0 };
                subjectScores[q.subject].total++;
                if (ans === correctIdx) { correct++; subjectScores[q.subject].correct++; }
            });
            
            const total = questions.length;
            const percent = Math.round((correct / total) * 100);
            const marksPerQ = currentMode === 'cbt' ? 2.5 : 1;
            const earned = correct * marksPerQ;
            const totalMarks = total * marksPerQ;
            
            quizResults = { 
                user: currentUser, 
                mode: currentMode, 
                subjects: selectedSubjects,
                correct, 
                total, 
                percent, 
                earnedMarks: earned, 
                totalMarks, 
                subjectScores, 
                timestamp: new Date().toISOString() 
            };
            
            // Save to localStorage
            let localResults = JSON.parse(localStorage.getItem('jamb_results') || '[]');
            localResults.push(quizResults);
            localStorage.setItem('jamb_results', JSON.stringify(localResults));
            
            // Save to Cloud
            await saveToCloud(quizResults);
            
            showScreen('resultScreen');
            document.getElementById('resultEmoji').textContent = percent >= 80 ? '­¤Åå' : percent >= 60 ? '­¤Æ¬' : '­¤ōØ';
            document.getElementById('resultScore').textContent = `${percent}%`;
            document.getElementById('totalMarksValue').textContent = `${earned.toFixed(1)}/${totalMarks} Marks`;
            document.getElementById('resultFeedback').textContent = percent >= 80 ? 'Outstanding!' : percent >= 60 ? 'Good effort!' : 'Keep practicing!';
            
            let breakdown = '';
            for (let s in subjectScores) {
                const d = subjectScores[s];
                breakdown += `<div style="display:flex;justify-content:space-between;color:#a0a0b0;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.1);"><span>${emojis[s]} ${s}</span><span>${d.correct}/${d.total} (${(d.correct*marksPerQ).toFixed(1)}/${(d.total*marksPerQ).toFixed(1)}) - ${Math.round(d.correct/d.total*100)}%</span></div>`;
            }
            document.getElementById('subjectBreakdown').innerHTML = breakdown;
        }

        async function saveToCloud(result) {
            try {
                // Get existing data
                const response = await fetch(`${JSONBIN_URL}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await response.json();
                const existing = data.record || { results: [], users: [] };
                
                // Add new result
                existing.results.push(result);
                if (!existing.users.find(u => u.phone === result.user.phone)) {
                    existing.users.push(result.user);
                }
                
                // Save back
                await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(existing)
                });
                console.log('Ō£ģ Saved to cloud');
            } catch (e) {
                console.error('Cloud save failed:', e);
            }
        }

        async function loadFromCloud() {
            try {
                const response = await fetch(`${JSONBIN_URL}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await response.json();
                allCloudResults = data.record || { results: [], users: [] };
                return allCloudResults;
            } catch (e) {
                console.error('Cloud load failed:', e);
                return { results: [], users: [] };
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function showAdmin() {
            const pw = prompt('Enter admin password:');
            if (pw !== ADMIN_PASSWORD) { alert('Wrong password'); return; }
            
            // Show loading
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:998;';
            const container = document.createElement('div');
            container.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;padding:30px;border-radius:20px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;z-index:999;';
            container.innerHTML = '<h2 style="color:#fff;">Loading from cloud...</h2><div class="loading">Fetching all results...</div>';
            document.body.appendChild(overlay);
            document.body.appendChild(container);
            
            // Load from cloud
            const cloudData = await loadFromCloud();
            const results = cloudData.results || [];
            const users = cloudData.users || [];
            
            let html = '<h2 style="color:#fff;">­¤ōŖ ADMIN PANEL (Cloud)</h2>';
            html += `<p style="color:#667eea;">­¤īÉ Total Users: ${users.length} | Total Attempts: ${results.length}</p>`;
            html += '<div style="max-height:350px;overflow-y:auto;">';
            
            const sorted = [...results].reverse();
            sorted.slice(0, 30).forEach(r => {
                if (r.user) {
                    html += `<div style="background:rgba(255,255,255,0.05);padding:10px;margin:5px 0;border-radius:10px;color:#fff;">`;
                    html += `<strong>${r.user.name}</strong> - ${r.percent}%<br>`;
                    html += `­¤ō× ${r.user.phone}<br>`;
                    html += `Marks: ${r.earnedMarks?.toFixed(1) || 0}/${r.totalMarks || 0}<br>`;
                    html += `Mode: ${r.mode?.toUpperCase() || 'N/A'} | ${r.correct}/${r.total}<br>`;
                    html += `­¤ĢÉ ${new Date(r.timestamp).toLocaleString()}</div>`;
                }
            });
            
            if (results.length > 30) html += `<p style="color:#808090;">...and ${results.length - 30} more</p>`;
            html += '</div><br>';
            html += '<button class="btn" onclick="exportCloudData()">­¤ōź Export CSV</button>';
            html += '<button class="btn btn-secondary" onclick="this.parentElement.parentElement.remove();document.querySelector(\'div[style*=\\\'fixed\\\']\').remove();">Close</button>';
            
            container.innerHTML = html;
            overlay.onclick = () => { overlay.remove(); container.remove(); };
            
            window.exportCloudData = function() {
                let csv = 'Name,Phone,Email,Mode,Score,Percent,Marks,Date\n';
                results.forEach(r => {
                    if (r.user) {
                        csv += `"${r.user.name}","${r.user.phone}","${r.user.email || ''}","${r.mode || ''}","${r.correct}/${r.total}","${r.percent}%","${r.earnedMarks?.toFixed(1) || 0}/${r.totalMarks || 0}","${r.timestamp}"\n`;
                    }
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `jamb_results_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            };
        }

        loadQuestions();
    </script>
</body>
</html>
